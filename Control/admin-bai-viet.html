<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quản lý bài viết - LIBERA Music School</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .admin-container {
            max-width: 900px;
            margin: 100px auto 50px;
            background: white;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        .admin-container h1 {
            font-size: 28px;
            margin-bottom: 25px;
            color: #2c3e66;
            border-left: 5px solid #2c3e66;
            padding-left: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #333;
        }
        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8eef2;
            border-radius: 16px;
            font-family: 'Open Sans', sans-serif;
            font-size: 15px;
            transition: 0.3s;
        }
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        .btn-submit {
            background: linear-gradient(135deg, #2c3e66, #1a2538);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(44,62,102,0.3);
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .note {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- Header (copy từ index.html, nhớ sửa đường dẫn ../) -->
    <header class="header"> ... </header>

    <div class="container">
        <div class="admin-container">
            <h1>📝 Đăng bài viết mới</h1>
            <form id="baiVietForm">
                <div class="form-group">
                    <label>Tiêu đề *</label>
                    <input type="text" id="tieuDe" required>
                </div>

                <div class="form-group">
                    <label>Ảnh đại diện (link) - hiển thị ở trang thư viện</label>
                    <input type="text" id="anhDaiDien" placeholder="https://...">
                    <div class="note">Để trống sẽ tự động lấy từ ảnh minh họa 1</div>
                </div>

                <div class="form-group">
                    <label>Nội dung phần 1 *</label>
                    <textarea id="noiDung1" required placeholder="Nhập đoạn văn đầu tiên..."></textarea>
                </div>

                <div class="form-group">
                    <label>Ảnh minh họa 1 (link)</label>
                    <input type="text" id="hinhAnh1" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label>Nội dung phần 2 (có thể bỏ trống)</label>
                    <textarea id="noiDung2" placeholder="Nhập đoạn văn thứ hai..."></textarea>
                </div>

                <div class="form-group">
                    <label>Ảnh minh họa 2 (link)</label>
                    <input type="text" id="hinhAnh2" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label>Kết luận</label>
                    <textarea id="ketLuan" placeholder="Những dòng kết thúc bài viết..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Đăng bài viết</button>
            </form>
            <div id="message" class="message"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer"> ... </footer>

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        const API_BASE = 'http://liberamusicschool.ddns.net:5000/api';
        
        document.getElementById('baiVietForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message';
            messageDiv.textContent = 'Đang đăng bài...';
            messageDiv.style.display = 'block';
            
            let anhDaiDien = document.getElementById('anhDaiDien').value;
            const hinhAnh1 = document.getElementById('hinhAnh1').value;
            if (!anhDaiDien && hinhAnh1) anhDaiDien = hinhAnh1;
            
            const payload = {
                tieuDe: document.getElementById('tieuDe').value,
                noiDung1: document.getElementById('noiDung1').value,
                hinhAnh1: hinhAnh1,
                noiDung2: document.getElementById('noiDung2').value,
                hinhAnh2: document.getElementById('hinhAnh2').value,
                ketLuan: document.getElementById('ketLuan').value,
                anhDaiDien: anhDaiDien,
                trangThai: true,
                daXoa: false
            };
            
            try {
                const res = await fetch(`${API_BASE}/BaiViet`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Bài viết đã được đăng thành công!';
                    document.getElementById('baiVietForm').reset();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Lỗi khi đăng bài. Vui lòng thử lại.';
                }
            } catch (err) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Không thể kết nối đến máy chủ. Kiểm tra API.';
            }
        });
    </script>
</body>
</html>
