<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký học thử miễn phí | LIBERA Music School Thái Nguyên</title>
    <meta name="description" content="Đăng ký học thử miễn phí 1 buổi tại LIBERA Music School Thái Nguyên. Trải nghiệm phương pháp giảng dạy hiện đại cùng giáo viên giàu kinh nghiệm.">
    
    <meta name="geo.region" content="VN-69" />
    <meta name="geo.placename" content="Thái Nguyên" />
    <link rel="canonical" href="https://[username].github.io/liberamusic/dang-ky.html">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="header">...</header>

    <div class="breadcrumb">
        <div class="container">
            <a href="index.html">Trang chủ</a> <i class="fas fa-chevron-right"></i>
            <span>Đăng ký học thử</span>
        </div>
    </div>

    <section class="page-hero">
        <div class="container">
            <h1>Đăng ký học thử miễn phí 1 buổi</h1>
            <p>Trải nghiệm phương pháp giảng dạy hiện đại cùng LIBERA</p>
        </div>
    </section>

    <section class="register-section">
        <div class="container">
            <div class="register-form">
                <form action="https://formspree.io/f/your-form-id" method="POST">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Họ tên học viên *</label>
                            <input type="text" name="student_name" required>
                        </div>
                        <div class="form-group">
                            <label>Tuổi *</label>
                            <input type="number" name="age" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Họ tên phụ huynh</label>
                            <input type="text" name="parent_name">
                        </div>
                        <div class="form-group">
                            <label>Số điện thoại *</label>
                            <input type="tel" name="phone" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email">
                        </div>
                        <div class="form-group">
                            <label>Môn học đăng ký *</label>
                            <select name="course" required>
                                <option value="">-- Chọn môn học --</option>
                                <option value="Piano">Piano</option>
                                <option value="Violin">Violin</option>
                                <option value="Hợp xướng">Hợp xướng</option>
                                <option value="Cello">Cello</option>
                                <option value="Xylophone">Xylophone</option>
                                <option value="Melodica">Melodica</option>
                                <option value="Thanh nhạc">Thanh nhạc</option>
                                <option value="Cảm thụ âm nhạc">Cảm thụ âm nhạc</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Ca học mong muốn</label>
                            <select name="shift">
                                <option value="Sáng">Sáng (08:00 - 11:30)</option>
                                <option value="Chiều">Chiều (13:30 - 17:00)</option>
                                <option value="Tối">Tối (18:00 - 20:30)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Ngày dự kiến</label>
                            <input type="date" name="expected_date">
                        </div>
                    </div>

                    <div class="form-group-full">
                        <label>Bạn biết đến LIBERA qua kênh nào? *</label>
                        <select name="source" required>
                            <option value="">-- Chọn --</option>
                            <option value="Google">Google</option>
                            <option value="Facebook">Facebook</option>
                            <option value="Người quen giới thiệu">Người quen giới thiệu</option>
                            <option value="Đi ngang qua thấy ở Thái Nguyên">Đi ngang qua thấy ở Thái Nguyên</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>

                    <div class="form-group-full">
                        <label>Ghi chú</label>
                        <textarea name="note" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Đăng ký ngay <i class="fas fa-heart"></i></button>
                </form>

                <div class="guarantee">
                    <div class="guarantee-item">
                        <i class="fas fa-gift"></i>
                        <h4>Miễn phí 100%</h4>
                        <p>Buổi học thử đầu tiên</p>
                    </div>
                    <div class="guarantee-item">
                        <i class="fas fa-handshake"></i>
                        <h4>Không cam kết</h4>
                        <p>Học thử - quyết định sau</p>
                    </div>
                    <div class="guarantee-item">
                        <i class="fas fa-chalkboard-user"></i>
                        <h4>Giáo viên giỏi</h4>
                        <p>Trực tiếp giảng dạy</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">...</footer>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
