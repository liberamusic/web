<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libera · Giai điệu Thiên thần</title>
    <!-- Font theo yêu cầu: Serif thanh lịch -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #0c0b0f; /* Nền tối để làm nổi vàng và trắng */
            color: #f5f5f5;
            line-height: 1.5;
            <!-- Thanh Điều Hướng (Navbar) -->
<nav style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(12, 11, 15, 0.9);
    backdrop-filter: blur(10px);
    padding: 1rem 2rem;
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 1px solid rgba(212, 175, 55, 0.3);
">
    <div style="display: flex; gap: 2.5rem; flex-wrap: wrap; justify-content: center;">
        <a href="index.html" style="color: #D4AF37; text-decoration: none; font-family: 'Cormorant Garamond', serif; font-weight: 600; letter-spacing: 2px;">TRANG CHỦ</a>
        <a href="about.html" style="color: #f5f5f5; text-decoration: none; font-family: 'Cormorant Garamond', serif; font-weight: 400; letter-spacing: 2px;">GIỚI THIỆU</a>
        <a href="courses.html" style="color: #f5f5f5; text-decoration: none; font-family: 'Cormorant Garamond', serif; font-weight: 400; letter-spacing: 2px;">KHÓA HỌC</a>
        <a href="pricing.html" style="color: #f5f5f5; text-decoration: none; font-family: 'Cormorant Garamond', serif; font-weight: 400; letter-spacing: 2px;">HỌC PHÍ</a>
        <a href="schedule.html" style="color: #f5f5f5; text-decoration: none; font-family: 'Cormorant Garamond', serif; font-weight: 400; letter-spacing: 2px;">LỊCH HỌC</a>
        <a href="contact.html" style="color: #f5f5f5; text-decoration: none; font-family: 'Cormorant Garamond', serif; font-weight: 400; letter-spacing: 2px;">LIÊN HỆ</a>
    </div>
</nav>
<!-- Đẩy nội dung xuống để không bị navbar che -->
<div style="height: 70px;"></div>
        }

        /* Khung chứa chính */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            
            /* Placeholder ảnh nền Nhà thờ / Ánh sáng (Gradient giả lập ánh sáng nhiệm màu) */
            background: radial-gradient(circle at top left, #2a2533, #0c0b0f 80%);
            position: relative;
            overflow: hidden;
        }

        /* Tạo hiệu ứng ánh sáng vàng nhẹ ở trên cùng (phong cách Thánh đường) */
        .hero::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -20%;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Tiêu đề chính LIBERA */
        h1 {
            font-size: 7rem;
            font-weight: 700;
            letter-spacing: 15px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 2;
            animation: fadeIn 2s ease-out;
        }

        /* Dòng giới thiệu phụ (Màu Gold đặc trưng) */
        .tagline {
            font-size: 1.4rem;
            font-weight: 400;
            color: #D4AF37; /* Vàng Gold */
            letter-spacing: 6px;
            word-spacing: 8px;
            text-transform: uppercase;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 1rem 0;
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 2;
            animation: fadeInUp 2.5s ease-out;
        }

        /* Nút "Xem thử" (đã sửa) */
        .btn-listen {
            background: transparent;
            border: 1.5px solid #D4AF37;
            color: #D4AF37;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 5px;
            padding: 1.2rem 3.5rem;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            margin-top: 2rem;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .btn-listen:hover {
            background: #D4AF37;
            color: #0c0b0f;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            border-color: #D4AF37;
        }

        /* Trích dẫn nhỏ mang tính chất Libera */
        .quote {
            position: absolute;
            bottom: 3rem;
            left: 0;
            right: 0;
            text-align: center;
            font-style: italic;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.5);
            z-index: 2;
            letter-spacing: 2px;
        }

        /* Hiệu ứng chuyển động nhẹ */
        @keyframes fadeIn {
            from { opacity: 0; letter-spacing: 25px; }
            to { opacity: 1; letter-spacing: 15px; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive cho mobile */
        @media (max-width: 600px) {
            h1 {
                font-size: 3.5rem;
                letter-spacing: 8px;
            }
            .tagline {
                font-size: 1rem;
                letter-spacing: 3px;
            }
            .btn-listen {
                font-size: 1.2rem;
                padding: 1rem 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>LIBERA</h1>
        <div class="tagline">Angel Voices · Eternal Peace</div>
        
        <!-- Nút đã sửa: Chữ "Xem thử" và mở link Libera -->
        <button class="btn-listen" id="viewButton">⟳ Xem thử</button>
        
        <div class="quote">
            “Âm nhạc là tiếng vọng của thiên đường” — Libera
        </div>
    </div>

    <script>
        // Code JavaScript: Khi click nút "Xem thử" -> Mở trang chủ Libera trong tab mới
        document.addEventListener('DOMContentLoaded', function() {
            const button = document.getElementById('viewButton');
            
            if (button) {
                button.addEventListener('click', function() {
                    // Mở trang chủ Libera trong tab mới
                    window.open('https://libera.org.uk', '_blank');
                });
            }
        });
    </script>

</body>
</html>
